<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BodyCheck</title>

  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

  <div class="container">

    <div class="card">
      <h1>BodyCheck</h1>

      <form action="/" method="POST">

        <div class="label-row">
          <label>Peso (kg)</label>
          <span class="exemplo">ex: 74.6</span>
        </div>
        <input type="number" step="0.01" name="peso" required>

        <div class="label-row">
          <label>Altura (m)</label>
          <span class="exemplo">ex: 1.70</span>
        </div>
        <input type="number" step="0.01" name="altura" required>

        <button type="submit">Calcular IMC</button>

      </form>
    </div>

    {% if imc is not none %}
    <div class="card resultado {{ classe }}">
      <h2>Resultado</h2>

      <p><strong>IMC:</strong></p>
      <p class="imc-valor" id="imc">{{ imc }}</p>

      <p>{{ mensagem }}</p>
      <p class="ajuste">{{ ajuste }}</p>
    </div>
    {% endif %}

  </div>

</body>

</html>
